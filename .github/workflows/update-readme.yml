name: Update README Certificate List

on:
 push:
 branches: [ main ]
 paths:
 - '*.pdf'
 workflow_dispatch:

permissions:
 contents: write

jobs:
 update-readme:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4
 with:
 persist-credentials: false
 fetch-depth: 0

 - name: Set up Python
 uses: actions/setup-python@v5
 with:
 python-version: '3.11'

 - name: Generate README
 run: python .github/scripts/generate_readme.py

 - name: Commit and push
 run: |
 git config --global user.name "Atul Harsh"
 git config --global user.email "atul-harsh33108@users.noreply.github.com"
 git add README.md
 if git diff --staged --quiet; then
 echo "No changes to commit"
 else
 git commit -m "chore: auto-update certificate list [skip ci]"
 git push
 fi